<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>MM99 Plinko Game</title><style>
:root{--gold:#ffd76a;--orange:#ff9f2f;--cyan:#14e8ff;--deep:#030615}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 18% 12%,#173f86 0,#07162f 28%,#02030b 75%);font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#fff}.page{height:100%;display:flex;align-items:center;justify-content:center;padding:10px;position:relative}.page:before,.page:after{content:"";position:absolute;inset:-10%;pointer-events:none}.page:before{background:radial-gradient(circle at 15% 30%,rgba(0,215,255,.22),transparent 35%),radial-gradient(circle at 80% 62%,rgba(255,171,42,.18),transparent 33%);filter:blur(14px);animation:bgMove 9s ease-in-out infinite alternate}.page:after{background-image:radial-gradient(rgba(255,255,255,.55) 1px,transparent 1.8px);background-size:58px 58px;opacity:.22;animation:star 2.8s ease-in-out infinite alternate}@keyframes bgMove{to{transform:translate(-2%,2%) scale(1.05)}}@keyframes star{to{opacity:.42}}.machine{position:relative;width:min(96vw,720px);height:min(96vh,1080px);max-height:960px;aspect-ratio:720/1080;border-radius:32px;padding:12px;background:linear-gradient(145deg,#0d2f70,#070a19 48%,#171009);box-shadow:0 0 0 1px rgba(255,220,130,.42),0 0 35px rgba(0,220,255,.32),0 0 80px rgba(255,178,45,.16),inset 0 0 0 1px rgba(255,255,255,.14);overflow:hidden}.machine:before{content:"";position:absolute;inset:8px;border-radius:26px;border:4px solid rgba(41,222,255,.52);box-shadow:0 0 18px rgba(0,221,255,.95),inset 0 0 20px rgba(0,221,255,.62);pointer-events:none}.machine:after{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 0 25%,rgba(255,255,255,.12) 31%,transparent 38% 100%);transform:translateX(-75%);animation:sweep 5.2s ease-in-out infinite;pointer-events:none}@keyframes sweep{60%,100%{transform:translateX(86%)}}.top{position:relative;z-index:8;display:flex;align-items:flex-start;gap:12px;padding:12px 16px 4px}.logo{width:116px;filter:drop-shadow(0 0 12px rgba(0,220,255,.82))}.title{flex:1}.title h1{margin:0;font-size:clamp(28px,5.5vw,48px);line-height:.95;letter-spacing:.08em;font-weight:1000;background:linear-gradient(#fff4b5,#ffbc43 50%,#ff771d);-webkit-background-clip:text;color:transparent;text-shadow:0 0 24px rgba(255,164,42,.28)}.title p{margin:8px 0 0;color:#d9e7ff;letter-spacing:.25em;font-size:12px;font-weight:900}.status{display:flex;flex-direction:column;gap:8px;min-width:130px;text-align:right}.pill{padding:8px 10px;border:1px solid rgba(255,218,120,.6);border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(0,0,0,.22));font-weight:950;font-size:12px;color:#fff1b6;box-shadow:inset 0 0 16px rgba(255,215,90,.08)}.panel{position:absolute;z-index:2;left:28px;right:28px;top:132px;bottom:24px;border-radius:28px;padding:12px;background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.045));box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}.boardWrap{position:relative;height:100%;overflow:hidden;border-radius:22px;background:linear-gradient(180deg,#1550bf 0%,#08276f 46%,#03081f 100%);box-shadow:inset 0 0 0 2px rgba(20,220,255,.56),inset 0 0 40px rgba(0,220,255,.36)}.boardPattern{position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 24% 16%,transparent 0 18px,rgba(255,255,255,.16) 19px 21px,transparent 22px),radial-gradient(circle at 72% 42%,transparent 0 30px,rgba(255,255,255,.12) 31px 33px,transparent 34px);background-size:130px 125px,175px 165px}.headerIn{position:absolute;top:14px;left:0;right:0;text-align:center;z-index:3;pointer-events:none}.plinko{font-size:clamp(48px,11vw,82px);font-weight:1000;letter-spacing:.08em;line-height:.9;background:linear-gradient(#fff0a4,#ffb13d 48%,#d75c15);-webkit-background-clip:text;color:transparent;text-shadow:0 8px 0 rgba(72,28,9,.45),0 0 22px rgba(255,200,70,.3)}.hint{margin-top:10px;font-size:clamp(16px,3.6vw,25px);font-weight:950;color:#fff3c8;text-shadow:0 0 14px rgba(255,204,84,.45)}#game{position:absolute;inset:0;width:100%;height:100%;z-index:2}.entries{position:absolute;top:132px;left:6%;right:6%;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;z-index:6}.entry{appearance:none;border:1px solid rgba(255,238,166,.72);border-radius:16px;padding:12px 3px 10px;background:linear-gradient(180deg,#fff7c7 0,#ad9958 48%,#352a16 100%);box-shadow:0 12px 22px rgba(0,0,0,.36),inset 0 2px 0 rgba(255,255,255,.58);font-weight:1000;letter-spacing:.15em;color:#1f1608;cursor:pointer;transition:.22s}.entry small{display:block;margin-top:4px;font-size:10px;letter-spacing:.22em;opacity:.75}.entry:hover:not(:disabled){transform:translateY(-2px);filter:saturate(1.2) brightness(1.1)}.entry:disabled{opacity:.5;cursor:not-allowed}.boxes{position:absolute;left:5%;right:5%;bottom:16px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;z-index:6}.gift{height:80px;border:0;border-radius:18px 18px 11px 11px;position:relative;overflow:hidden;color:#16061d;font-weight:1000;letter-spacing:.12em;box-shadow:0 0 18px var(--g),0 15px 26px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.62);background:linear-gradient(135deg,var(--a),var(--b) 48%,var(--c));transform-style:preserve-3d}.gift:before{content:"MM99";position:absolute;inset:0;display:grid;place-items:center;font-size:26px;font-weight:1000;color:rgba(255,255,255,.21);transform:rotate(-12deg)}.gift:after{content:"";position:absolute;left:9%;right:9%;top:13px;height:15px;border-radius:999px;background:linear-gradient(90deg,#fff7b7,#ffd52c,#fff9c9);box-shadow:0 0 14px rgba(255,225,80,.9)}.gift span{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:13px;color:#18061f;text-shadow:0 1px rgba(255,255,255,.5)}.gift.open{animation:giftOpen .72s ease forwards}.gift.open:after{animation:lid .72s ease forwards}@keyframes giftOpen{40%{transform:scale(1.09)}100%{transform:scale(1.04);filter:brightness(1.38) saturate(1.16)}}@keyframes lid{to{transform:translateY(-30px) rotate(-8deg);opacity:.22}}.result{position:absolute;z-index:14;left:50%;bottom:106px;width:min(82%,390px);transform:translate(-50%,32px) scale(.7);opacity:0;pointer-events:none}.result.show{animation:cardIn .88s cubic-bezier(.16,1.25,.31,1) forwards}.card{position:relative;border-radius:24px;padding:18px 18px 16px;text-align:center;background:linear-gradient(180deg,#fff8d8,#ffd767 48%,#ff8730);box-shadow:0 0 0 2px rgba(255,255,255,.65),0 0 38px rgba(255,209,67,.7),0 18px 42px rgba(0,0,0,.55);color:#5c2100;overflow:hidden}.card:before{content:"";position:absolute;inset:-45%;background:conic-gradient(transparent,rgba(255,255,255,.68),transparent 34%);animation:spin 2s linear infinite}.card>*{position:relative}.ok{font-size:14px;font-weight:950;letter-spacing:.22em}.amount{font-size:clamp(46px,12vw,74px);line-height:1;font-weight:1000;letter-spacing:.03em;margin:5px 0;text-shadow:0 3px rgba(255,255,255,.45)}.timeLine{font-size:12px;font-weight:900}.verify{position:absolute;right:18px;bottom:12px;z-index:10;color:#fff;font-weight:900;font-size:10px;letter-spacing:.12em;opacity:.88;text-shadow:0 0 8px #04e7ff}.toast{position:absolute;z-index:20;top:48%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.74);border:1px solid rgba(255,216,118,.5);padding:14px 18px;border-radius:18px;font-weight:900;color:#fff3c7;box-shadow:0 0 26px rgba(255,200,50,.25);display:none;text-align:center}.toast.show{display:block;animation:toast .22s ease}.shake{animation:shake .18s ease}@keyframes cardIn{to{opacity:1;transform:translate(-50%,0) scale(1)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes toast{from{opacity:0;transform:translate(-50%,-45%) scale(.9)}}@keyframes shake{20%{transform:translateX(-2px)}50%{transform:translateX(2px)}80%{transform:translateX(-1px)}}@media(max-width:560px){.page{padding:0}.machine{width:100vw;height:100dvh;border-radius:0;max-height:none}.machine:before{border-radius:0}.top{padding:10px 12px 0}.logo{width:82px}.title h1{font-size:28px}.title p{font-size:9px}.status{min-width:105px}.pill{font-size:10px;padding:7px}.panel{top:112px;left:12px;right:12px;bottom:10px;padding:8px}.entries{top:118px;left:4%;right:4%;gap:5px}.entry{border-radius:12px;padding:9px 1px 7px;font-size:11px}.entry small{font-size:8px}.boxes{left:3%;right:3%;gap:6px;bottom:11px}.gift{height:62px;border-radius:12px}.gift span{font-size:11px}.gift:before{font-size:18px}.gift:after{height:10px}.plinko{font-size:43px}.hint{font-size:18px}.verify{font-size:8px;right:10px}}</style></head><body><div class="page"><main class="machine" id="machine"><header class="top"><img src="mm99-logo.png" class="logo"><div class="title"><h1>HỘP QUÀ MAY MẮN</h1><p>PREMIUM PLINKO GAME</p></div><div class="status"><div class="pill" id="clock">--:--:--</div><div class="pill" id="attempts">Lượt hôm nay: 0/2</div></div></header><section class="panel"><div class="boardWrap"><div class="boardPattern"></div><div class="headerIn"><div class="plinko">PLINKO</div><div class="hint">Chọn 1 cửa để thả bóng</div></div><canvas id="game"></canvas><div class="entries" id="entries"></div><div class="boxes" id="boxes"></div><div class="result" id="result"><div class="card"><div class="ok">CHÚC MỪNG</div><div class="amount" id="amount">8.888</div><div class="timeLine" id="resultTime">--</div></div></div><div class="verify" id="verify">LIVE CODE</div><div class="toast" id="toast"></div></div></section></main></div><script>
(()=>{const MAX=2,KEY='mm99_plinko_game_physics_v3';const prizes=[['6888',20],['8.888',25],['9.888',25],['10.888',20],['12888',5],['13.888',3],['14.888',1],['15.888',1]];const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');const entries=document.getElementById('entries'),boxesEl=document.getElementById('boxes'),clock=document.getElementById('clock'),attemptsEl=document.getElementById('attempts'),result=document.getElementById('result'),amountEl=document.getElementById('amount'),resultTime=document.getElementById('resultTime'),toast=document.getElementById('toast'),verify=document.getElementById('verify'),machine=document.getElementById('machine');let W=0,H=0,dpr=1,pins=[],boxCenters=[],ball=null,animating=false,particles=[],sparkles=[],trail=[],last=0;const giftColors=[['#dc27dc','#ff55c9','#ffb36d','#e03dff'],['#10a4ff','#62f2e0','#d9f59d','#12c8ff'],['#f72e4f','#ff7945','#ffd06a','#ff3b5c'],['#22d9a3','#40ffc7','#cbff8d','#00ffc6'],['#9223e9','#e84cff','#ffbd6f','#c126ff']];
function today(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}function state(){try{let s=JSON.parse(localStorage.getItem(KEY)||'{}');if(s.day!==today())s={day:today(),count:0};return s}catch(e){return{day:today(),count:0}}}function save(s){localStorage.setItem(KEY,JSON.stringify(s));updateAttempts()}function updateAttempts(){attemptsEl.textContent='Lượt hôm nay: '+state().count+'/'+MAX}function fmt(d=new Date()){return d.toLocaleTimeString('vi-VN',{hour12:false})+' '+d.toLocaleDateString('vi-VN')}setInterval(()=>{clock.textContent=fmt();verify.textContent='LIVE CODE '+Math.random().toString(36).slice(2,6).toUpperCase()},500);clock.textContent=fmt();updateAttempts();
function initUI(){entries.innerHTML='';for(let i=0;i<5;i++){let b=document.createElement('button');b.className='entry';b.innerHTML='ĐƯỜNG '+(i+1)+'<small>THẢ BÓNG</small>';b.onclick=()=>start(i);entries.appendChild(b)}boxesEl.innerHTML='';for(let i=0;i<5;i++){let g=document.createElement('div');g.className='gift';let c=giftColors[i];g.style.setProperty('--a',c[0]);g.style.setProperty('--b',c[1]);g.style.setProperty('--c',c[2]);g.style.setProperty('--g',c[3]);g.innerHTML='<span>HỘP '+(i+1)+'</span>';boxesEl.appendChild(g)}}
function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(2,window.devicePixelRatio||1);W=r.width;H=r.height;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);buildPins();draw()}window.addEventListener('resize',resize);initUI();setTimeout(resize,100);
function buildPins(){pins=[];boxCenters=[];const top=H*.285,bottom=H*.805,left=W*.105,right=W*.895;const rows=15;const cols=10;const gapX=(right-left)/(cols-1);const gapY=(bottom-top)/(rows-1);for(let r=0;r<rows;r++){const count=r%2===0?10:9;const offset=r%2===0?0:gapX/2;for(let c=0;c<count;c++){let x=left+c*gapX+offset;let y=top+r*gapY;pins.push({x,y,r,c,rad:Math.max(2.7,Math.min(4.4,W*.0052)),pulse:Math.random()*6.28})}}const bl=W*.07,br=W*.93;for(let i=0;i<5;i++)boxCenters.push(bl+(br-bl)*(i+.5)/5)}
function pickPrize(){let total=prizes.reduce((a,p)=>a+p[1],0),r=Math.random()*total;for(const p of prizes){r-=p[1];if(r<=0)return p[0]}return prizes[0][0]}function toastMsg(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)}function setButtons(dis){[...entries.children].forEach(b=>b.disabled=dis)}
function start(entry){if(animating)return;let s=state();if(s.count>=MAX){toastMsg('Hôm nay đã hết lượt chơi');return}result.classList.remove('show');[...boxesEl.children].forEach(x=>x.classList.remove('open'));const startXs=[W*.18,W*.34,W*.50,W*.66,W*.82];ball={x:startXs[entry],y:H*.245,px:startXs[entry],py:H*.245,vx:(Math.random()-.5)*0.35,vy:0,r:Math.max(7.5,Math.min(10.5,W*.0125)),prize:pickPrize(),rot:0,resting:0,done:false};animating=true;setButtons(true);trail=[];s.count++;save(s);last=performance.now();requestAnimationFrame(loop)}
function loop(now){const dt=Math.min(1.35,(now-last)/16.666||1);last=now;updatePhysics(dt);draw();if(animating||particles.length||sparkles.length)requestAnimationFrame(loop)}
function updatePhysics(dt){if(ball&&!ball.done){const sub=4,step=dt/sub;for(let k=0;k<sub;k++)stepBall(step)}particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.08*dt;p.life-=.018*dt;p.rot+=p.vr*dt});particles=particles.filter(p=>p.life>0);sparkles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=.035*dt});sparkles=sparkles.filter(p=>p.life>0)}
function stepBall(dt){if(!ball||ball.done)return;ball.px=ball.x;ball.py=ball.y;ball.vy+=0.115*dt;ball.vx*=0.998;ball.vy*=0.999;const maxV=6.2;let sp=Math.hypot(ball.vx,ball.vy);if(sp>maxV){ball.vx=ball.vx/sp*maxV;ball.vy=ball.vy/sp*maxV}ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;const wallL=W*.055+ball.r,wallR=W*.945-ball.r;if(ball.x<wallL){ball.x=wallL;ball.vx=Math.abs(ball.vx)*.45}if(ball.x>wallR){ball.x=wallR;ball.vx=-Math.abs(ball.vx)*.45}
let hitSomething=false;const minY=ball.y-ball.r-8,maxY=ball.y+ball.r+8;for(const p of pins){if(p.y<minY||p.y>maxY)continue;const dx=ball.x-p.x,dy=ball.y-p.y;const min=ball.r+p.rad+0.4;const d2=dx*dx+dy*dy;if(d2>0.0001&&d2<min*min){let d=Math.sqrt(d2),nx=dx/d,ny=dy/d;const penetration=min-d;ball.x+=nx*(penetration+0.05);ball.y+=ny*(penetration+0.05);const vn=ball.vx*nx+ball.vy*ny;if(vn<0.15){const restitution=.31;ball.vx-=(1+restitution)*vn*nx;ball.vy-=(1+restitution)*vn*ny;const tangentX=-ny,tangentY=nx;let vt=ball.vx*tangentX+ball.vy*tangentY;vt*=.18;ball.vx-=vt*tangentX;ball.vy-=vt*tangentY;if(ball.vy<-0.8)ball.vy=-0.8;ball.vy+=0.052;ball.vx+=nx*.055;}hitSomething=true;if(Math.random()<.25)emitSpark(p.x,p.y,2)}}}
if(hitSomething){ball.resting=0}else{ball.resting++}if(ball.resting>18&&Math.hypot(ball.vx,ball.vy)<0.42){ball.vy+=0.22;ball.vx+=(Math.random()-.5)*0.12;ball.resting=0}ball.rot+=ball.vx*.055+ball.vy*.015;trail.push({x:ball.x,y:ball.y,life:1});if(trail.length>34)trail.shift();if(ball.y>H*.842){ball.done=true;const target=Math.max(0,Math.min(4,Math.floor((ball.x-W*.07)/(W*.86/5))));ball.y=H*.842;finish(target,ball.prize)}}
function finish(target,prize){animating=false;setButtons(false);const gift=boxesEl.children[target];gift.classList.add('open');emitConfetti(boxCenters[target],H*.79,95);amountEl.textContent=prize;resultTime.textContent=fmt(new Date());setTimeout(()=>result.classList.add('show'),420)}function emitSpark(x,y,n){for(let i=0;i<n;i++)sparkles.push({x,y,vx:(Math.random()-.5)*1.6,vy:(Math.random()-.5)*1.6,life:.55+Math.random()*.2})}function emitConfetti(x,y,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*7,vy:-Math.random()*7-1,life:1,rot:Math.random()*6.28,vr:(Math.random()-.5)*.2,w:4+Math.random()*5,h:8+Math.random()*10,c:['#fff4a4','#ffcf35','#ff58c8','#31efff','#9cff77'][i%5]})}
function draw(){ctx.clearRect(0,0,W,H);drawBoard();drawPins();drawTrail();if(ball)drawBall(ball);drawParticles()}function drawBoard(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(30,92,210,.26)');g.addColorStop(1,'rgba(0,0,0,.16)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.save();ctx.globalAlpha=.18;ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;for(let x=W*.06;x<W*.96;x+=W*.085){ctx.beginPath();ctx.moveTo(x,H*.2);ctx.lineTo(x,H*.86);ctx.stroke()}for(let y=H*.25;y<H*.84;y+=H*.07){ctx.beginPath();ctx.moveTo(W*.04,y);ctx.lineTo(W*.96,y);ctx.stroke()}ctx.restore()}function drawPins(){pins.forEach(p=>{let rad=p.rad;ctx.save();ctx.translate(p.x,p.y);let grd=ctx.createRadialGradient(-rad*.35,-rad*.45,1,0,0,rad*1.55);grd.addColorStop(0,'#ffffff');grd.addColorStop(.35,'#e7f5ff');grd.addColorStop(.78,'#6a8198');grd.addColorStop(1,'#1d2d3b');ctx.shadowColor='rgba(205,235,255,.9)';ctx.shadowBlur=9;ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,rad,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.86)';ctx.beginPath();ctx.arc(-rad*.28,-rad*.32,Math.max(1,rad*.23),0,Math.PI*2);ctx.fill();ctx.restore()})}function drawTrail(){if(!ball)return;for(let i=0;i<trail.length;i++){let t=trail[i];ctx.globalAlpha=i/trail.length*.18;ctx.fillStyle='#dff5ff';ctx.beginPath();ctx.arc(t.x,t.y,ball.r*(i/trail.length)*.72,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}function drawBall(b){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);let rg=ctx.createRadialGradient(-b.r*.35,-b.r*.45,1,0,0,b.r*1.25);rg.addColorStop(0,'#ffffff');rg.addColorStop(.18,'#ccfbff');rg.addColorStop(.56,'#2f88bd');rg.addColorStop(1,'#06152c');ctx.shadowColor='rgba(38,226,255,.82)';ctx.shadowBlur=18;ctx.fillStyle=rg;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,255,255,.86)';ctx.stroke();ctx.restore()}function drawParticles(){particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});sparkles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle='#fff8c7';ctx.shadowColor='#fff091';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,2.2*p.life,0,Math.PI*2);ctx.fill();ctx.restore()})}})();
</script></body></html>
