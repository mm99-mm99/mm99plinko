<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>MM99 Plinko Game</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 20% 12%,#123e83 0,#071632 32%,#05040a 82%);font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#fff}.page{height:100%;display:grid;place-items:center;padding:10px;position:relative}.page:before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.35) 1px,transparent 1.7px);background-size:52px 52px;opacity:.3;animation:stars 2.8s ease-in-out infinite alternate}@keyframes stars{to{opacity:.52}}.machine{position:relative;width:min(96vw,760px);height:min(96vh,1060px);max-height:980px;aspect-ratio:760/1060;border-radius:34px;padding:13px;background:linear-gradient(145deg,#133b79,#080b1d 52%,#1a1206);box-shadow:0 0 0 1px rgba(255,221,130,.45),0 0 38px rgba(0,224,255,.36),0 0 90px rgba(255,183,58,.17),inset 0 0 0 1px rgba(255,255,255,.16);overflow:hidden}.machine:before{content:"";position:absolute;inset:8px;border-radius:27px;border:4px solid rgba(34,225,255,.58);box-shadow:0 0 20px rgba(0,225,255,.95),inset 0 0 24px rgba(0,225,255,.45);pointer-events:none}.machine:after{content:"";position:absolute;inset:-20%;background:linear-gradient(105deg,transparent 0 28%,rgba(255,255,255,.12) 34%,transparent 42% 100%);transform:translateX(-70%);animation:sweep 5.6s ease-in-out infinite;pointer-events:none}@keyframes sweep{65%,100%{transform:translateX(82%)}}.top{position:relative;z-index:7;display:flex;gap:14px;align-items:flex-start;padding:13px 17px 8px}.logo{width:118px;filter:drop-shadow(0 0 13px rgba(0,224,255,.8))}.title{flex:1;min-width:0}.title h1{margin:0;font-size:clamp(30px,5.7vw,52px);line-height:.94;letter-spacing:.07em;font-weight:1000;background:linear-gradient(#fff6bf,#ffc14a 52%,#ff8027);-webkit-background-clip:text;color:transparent;text-shadow:0 0 28px rgba(255,170,50,.28)}.title p{margin:7px 0 0;color:#d9e6ff;letter-spacing:.25em;font-weight:950;font-size:12px}.status{display:flex;flex-direction:column;gap:9px;min-width:136px}.pill{padding:9px 12px;border:1px solid rgba(255,223,130,.65);border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(0,0,0,.22));text-align:center;color:#fff0b6;font-weight:950;font-size:12px;box-shadow:inset 0 0 15px rgba(255,215,90,.09)}.panel{position:absolute;left:28px;right:28px;top:132px;bottom:22px;padding:12px;border-radius:29px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05));box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}.board{position:relative;height:100%;overflow:hidden;border-radius:23px;background:linear-gradient(180deg,#1767da 0,#0d3b9e 25%,#082163 60%,#03081d 100%);box-shadow:inset 0 0 0 2px rgba(21,224,255,.62),inset 0 0 42px rgba(0,226,255,.33),0 16px 28px rgba(0,0,0,.42)}.board:before{content:"";position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 22% 18%,transparent 0 22px,rgba(255,255,255,.18) 23px 25px,transparent 26px),radial-gradient(circle at 78% 48%,transparent 0 32px,rgba(255,255,255,.12) 33px 36px,transparent 37px);background-size:138px 128px,176px 170px}.headline{position:absolute;top:13px;left:0;right:0;text-align:center;z-index:4;pointer-events:none}.plinko{font-size:clamp(48px,10vw,83px);font-weight:1000;letter-spacing:.08em;line-height:.9;background:linear-gradient(#fff2ae,#ffbd3f 48%,#d66119);-webkit-background-clip:text;color:transparent;text-shadow:0 8px 0 rgba(70,31,11,.45),0 0 24px rgba(255,199,65,.32)}.hint{margin-top:11px;font-size:clamp(16px,3.3vw,25px);font-weight:1000;color:#fff2c5;text-shadow:0 0 15px rgba(255,213,90,.5)}#game{position:absolute;inset:0;width:100%;height:100%;z-index:2}.entries{position:absolute;top:125px;left:5%;right:5%;display:grid;grid-template-columns:repeat(5,1fr);gap:9px;z-index:5}.entry{appearance:none;border:1px solid rgba(255,239,170,.72);border-radius:16px;padding:12px 2px 10px;background:linear-gradient(180deg,#fff9ca 0,#baa363 48%,#302512 100%);box-shadow:0 12px 23px rgba(0,0,0,.38),inset 0 2px 0 rgba(255,255,255,.6);color:#1e1608;cursor:pointer;font-weight:1000;letter-spacing:.13em;transition:.18s}.entry small{display:block;margin-top:4px;font-size:10px;letter-spacing:.2em;opacity:.75}.entry:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.1) saturate(1.15)}.entry:disabled{opacity:.52;cursor:not-allowed}.boxes{position:absolute;left:4.2%;right:4.2%;bottom:15px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;z-index:5}.gift{height:84px;border-radius:19px 19px 12px 12px;position:relative;overflow:hidden;box-shadow:0 0 20px var(--g),0 16px 28px rgba(0,0,0,.43),inset 0 2px 0 rgba(255,255,255,.65);background:linear-gradient(135deg,var(--a),var(--b) 48%,var(--c));color:#1d0825;font-weight:1000;text-align:center}.gift:before{content:"MM99";position:absolute;inset:0;display:grid;place-items:center;font-size:27px;color:rgba(255,255,255,.22);transform:rotate(-13deg);font-weight:1000}.gift:after{content:"";position:absolute;left:9%;right:9%;top:13px;height:16px;border-radius:999px;background:linear-gradient(90deg,#fff8be,#ffda34,#fff9cb);box-shadow:0 0 14px rgba(255,226,86,.95)}.gift span{position:absolute;left:0;right:0;bottom:12px;font-size:13px;letter-spacing:.12em;text-shadow:0 1px rgba(255,255,255,.55)}.gift.open{animation:openGift .75s ease forwards}.gift.open:after{animation:lid .75s ease forwards}@keyframes openGift{45%{transform:scale(1.1)}100%{transform:scale(1.05);filter:brightness(1.36) saturate(1.16)}}@keyframes lid{to{transform:translateY(-32px) rotate(-9deg);opacity:.22}}.result{position:absolute;z-index:13;left:50%;bottom:108px;width:min(82%,395px);opacity:0;transform:translate(-50%,34px) scale(.72);pointer-events:none}.result.show{animation:cardIn .86s cubic-bezier(.17,1.25,.31,1) forwards}.card{position:relative;overflow:hidden;text-align:center;border-radius:24px;padding:18px 18px 16px;color:#5b2100;background:linear-gradient(180deg,#fff9dc,#ffd96b 48%,#ff8731);box-shadow:0 0 0 2px rgba(255,255,255,.65),0 0 40px rgba(255,211,68,.72),0 19px 44px rgba(0,0,0,.56)}.card:before{content:"";position:absolute;inset:-45%;background:conic-gradient(transparent,rgba(255,255,255,.7),transparent 34%);animation:spin 2.2s linear infinite}.card>*{position:relative}.ok{font-size:14px;font-weight:1000;letter-spacing:.22em}.amount{font-size:clamp(48px,12vw,76px);line-height:1;margin:5px 0;font-weight:1000;letter-spacing:.03em;text-shadow:0 3px rgba(255,255,255,.45)}.timeLine{font-size:12px;font-weight:950}.verify{position:absolute;right:18px;bottom:12px;z-index:8;color:#fff;font-weight:950;font-size:10px;letter-spacing:.12em;opacity:.9;text-shadow:0 0 9px #04e7ff}.toast{position:absolute;z-index:20;top:48%;left:50%;transform:translate(-50%,-50%);display:none;text-align:center;background:rgba(0,0,0,.76);border:1px solid rgba(255,216,118,.55);padding:14px 18px;border-radius:18px;color:#fff3c7;font-weight:950;box-shadow:0 0 28px rgba(255,200,50,.28)}.toast.show{display:block;animation:toast .2s ease}@keyframes cardIn{to{opacity:1;transform:translate(-50%,0) scale(1)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes toast{from{opacity:0;transform:translate(-50%,-45%) scale(.9)}}@media(max-width:560px){.page{padding:0}.machine{width:100vw;height:100dvh;border-radius:0;max-height:none}.machine:before{border-radius:0}.top{padding:10px 12px 0}.logo{width:82px}.title h1{font-size:28px}.title p{font-size:9px}.status{min-width:105px}.pill{font-size:10px;padding:7px}.panel{top:112px;left:12px;right:12px;bottom:10px;padding:8px}.entries{top:116px;left:4%;right:4%;gap:5px}.entry{border-radius:12px;padding:9px 1px 7px;font-size:11px}.entry small{font-size:8px}.boxes{left:3%;right:3%;gap:6px;bottom:10px}.gift{height:62px;border-radius:12px}.gift span{font-size:11px}.gift:before{font-size:18px}.gift:after{height:10px}.plinko{font-size:43px}.hint{font-size:18px}.verify{font-size:8px;right:10px}}
</style></head><body><div class="page"><main class="machine"><header class="top"><img src="mm99-logo.png" class="logo" alt="MM99"><div class="title"><h1>HỘP QUÀ MAY MẮN</h1><p>PREMIUM PLINKO GAME</p></div><div class="status"><div class="pill" id="clock">--:--:--</div><div class="pill" id="attempts">Lượt hôm nay: 0/2</div></div></header><section class="panel"><div class="board" id="board"><div class="headline"><div class="plinko">PLINKO</div><div class="hint">Chọn 1 cửa để thả bóng</div></div><canvas id="game"></canvas><div class="entries" id="entries"></div><div class="boxes" id="boxes"></div><div class="result" id="result"><div class="card"><div class="ok">CHÚC MỪNG</div><div class="amount" id="amount">8.888</div><div class="timeLine" id="resultTime">--</div></div></div><div class="verify" id="verify">LIVE CODE</div><div class="toast" id="toast"></div></div></section></main></div><script>
(()=>{
'use strict';
const MAX=2,KEY='mm99_plinko_game_physics_fixed_v4';
const prizes=[['6888',20],['8.888',25],['9.888',25],['10.888',20],['12888',5],['13.888',3],['14.888',1],['15.888',1]];
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const board=document.getElementById('board'),entries=document.getElementById('entries'),boxesEl=document.getElementById('boxes'),clock=document.getElementById('clock'),attemptsEl=document.getElementById('attempts'),result=document.getElementById('result'),amountEl=document.getElementById('amount'),resultTime=document.getElementById('resultTime'),toast=document.getElementById('toast'),verify=document.getElementById('verify');
let W=0,H=0,dpr=1,pins=[],boxCenters=[],ball=null,animating=false,last=0,trail=[],particles=[],sparkles=[];
const giftColors=[['#dc27dc','#ff55c9','#ffb36d','#e03dff'],['#10a4ff','#62f2e0','#d9f59d','#12c8ff'],['#f72e4f','#ff7945','#ffd06a','#ff3b5c'],['#22d9a3','#40ffc7','#cbff8d','#00ffc6'],['#9223e9','#e84cff','#ffbd6f','#c126ff']];
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmt(d){return d.toLocaleTimeString('vi-VN',{hour12:false})+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function state(){try{let s=JSON.parse(localStorage.getItem(KEY)||'{}');if(s.day!==today())s={day:today(),count:0};return s}catch(e){return{day:today(),count:0}}}
function save(s){localStorage.setItem(KEY,JSON.stringify(s));attemptsEl.textContent='Lượt hôm nay: '+s.count+'/'+MAX}
function tickClock(){const d=new Date();clock.textContent=fmt(d);verify.textContent='LIVE CODE '+Math.random().toString(36).slice(2,6).toUpperCase()}setInterval(tickClock,1000);tickClock();save(state());
function pickPrize(){let r=Math.random()*100,acc=0;for(const [v,p] of prizes){acc+=p;if(r<=acc)return v}return prizes[0][0]}
function initUI(){entries.innerHTML='';for(let i=0;i<5;i++){const b=document.createElement('button');b.className='entry';b.innerHTML='ĐƯỜNG '+(i+1)+'<small>THẢ BÓNG</small>';b.onclick=()=>start(i);entries.appendChild(b)}boxesEl.innerHTML='';for(let i=0;i<5;i++){const g=document.createElement('div');g.className='gift';const c=giftColors[i];g.style.setProperty('--a',c[0]);g.style.setProperty('--b',c[1]);g.style.setProperty('--c',c[2]);g.style.setProperty('--g',c[3]);g.innerHTML='<span>HỘP '+(i+1)+'</span>';boxesEl.appendChild(g)}}
function resize(){const r=board.getBoundingClientRect();W=r.width;H=r.height;dpr=Math.min(2,window.devicePixelRatio||1);canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);buildPins();draw()}
function buildPins(){pins=[];boxCenters=[];const top=H*.30,bottom=H*.79,left=W*.10,right=W*.90;const rows=16,cols=11;const gapX=(right-left)/(cols-1),gapY=(bottom-top)/(rows-1);const rad=Math.max(2.4,Math.min(3.9,W*.0048));for(let r=0;r<rows;r++){const offset=(r%2)*gapX/2;const count=r%2?cols-1:cols;for(let c=0;c<count;c++){let x=left+offset+c*gapX;let y=top+r*gapY;pins.push({x,y,rad,hit:0})}}const bl=W*.055,br=W*.945;for(let i=0;i<5;i++)boxCenters.push(bl+(br-bl)*(i+.5)/5)}
function setBtns(dis){[...entries.children].forEach(b=>b.disabled=dis)}
function toastMsg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)}
function start(entry){if(animating)return;let s=state();if(s.count>=MAX){toastMsg('Hôm nay đã hết lượt chơi');return}result.classList.remove('show');[...boxesEl.children].forEach(x=>x.classList.remove('open'));const xs=[W*.18,W*.34,W*.50,W*.66,W*.82];ball={x:xs[entry],y:H*.235,vx:(Math.random()-.5)*.18,vy:.45,r:Math.max(7.5,Math.min(10,W*.012)),rot:0,prize:pickPrize(),hitIds:new Set(),settle:0};trail=[];animating=true;setBtns(true);s.count++;save(s);last=performance.now();requestAnimationFrame(loop)}
function loop(t){let dt=Math.min(.024,(t-last)/1000||.016);last=t;for(let i=0;i<3;i++)step(dt/3);updateFX(dt);draw();if(animating)requestAnimationFrame(loop)}
function step(dt){if(!ball)return;const g=940,air=.997;ball.vy+=g*dt;ball.vx*=air;ball.vy*=.999;ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;ball.rot+=ball.vx*dt*.045;const left=W*.045,right=W*.955;if(ball.x<left+ball.r){ball.x=left+ball.r;ball.vx=Math.abs(ball.vx)*.55}if(ball.x>right-ball.r){ball.x=right-ball.r;ball.vx=-Math.abs(ball.vx)*.55}for(let k=0;k<2;k++){for(let i=0;i<pins.length;i++){const p=pins[i],dx=ball.x-p.x,dy=ball.y-p.y,dist=Math.hypot(dx,dy),min=ball.r+p.rad+0.6;if(dist>0&&dist<min){const nx=dx/dist,ny=dy/dist;const overlap=min-dist;ball.x+=nx*overlap;ball.y+=ny*overlap;const dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=1.45*dot*nx;ball.vy-=1.25*dot*ny}ball.vx+=nx*22+((p.x<W/2)?18:-18)*(Math.abs(nx)<.2?.3:0);ball.vy=Math.max(ball.vy*.82,125);ball.vx=Math.max(-330,Math.min(330,ball.vx));p.hit=.18;emitSpark(p.x,p.y,2)}}}
trail.push({x:ball.x,y:ball.y});if(trail.length>24)trail.shift();const boxTop=H*.835;if(ball.y>boxTop-ball.r){let target=Math.max(0,Math.min(4,Math.floor(ball.x/W*5)));ball.x+=(boxCenters[target]-ball.x)*.08;ball.vx*=.82;ball.vy*=.84;if(ball.y>H*.875||Math.abs(ball.x-boxCenters[target])<8){finish(target,ball.prize);ball=null}}}
function updateFX(dt){particles=particles.filter(p=>(p.life-=dt*.72)>0);for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.rot+=p.vr}sparkles=sparkles.filter(p=>(p.life-=dt*1.8)>0);for(const p of sparkles){p.x+=p.vx;p.y+=p.vy;p.vy+=.04}pins.forEach(p=>{if(p.hit>0)p.hit-=dt})}
function finish(target,prize){animating=false;setBtns(false);boxesEl.children[target].classList.add('open');emitConfetti(boxCenters[target],H*.79,105);amountEl.textContent=prize;resultTime.textContent=fmt(new Date());setTimeout(()=>result.classList.add('show'),380)}
function emitSpark(x,y,n){for(let i=0;i<n;i++)sparkles.push({x,y,vx:(Math.random()-.5)*1.7,vy:(Math.random()-.7)*1.5,life:.55})}
function emitConfetti(x,y,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*7,vy:-Math.random()*7-1,life:1,rot:Math.random()*6.28,vr:(Math.random()-.5)*.22,w:4+Math.random()*5,h:8+Math.random()*10,c:['#fff4a4','#ffcf35','#ff58c8','#31efff','#9cff77'][i%5]})}
function draw(){ctx.clearRect(0,0,W,H);drawGrid();drawPins();drawTrail();if(ball)drawBall(ball);drawFX()}
function drawGrid(){ctx.save();ctx.globalAlpha=.16;ctx.strokeStyle='rgba(255,255,255,.14)';ctx.lineWidth=1;for(let x=W*.06;x<W*.96;x+=W*.085){ctx.beginPath();ctx.moveTo(x,H*.22);ctx.lineTo(x,H*.84);ctx.stroke()}for(let y=H*.28;y<H*.83;y+=H*.066){ctx.beginPath();ctx.moveTo(W*.04,y);ctx.lineTo(W*.96,y);ctx.stroke()}ctx.restore()}
function drawPins(){for(const p of pins){const pulse=Math.max(0,p.hit)*2;ctx.save();ctx.translate(p.x,p.y);let rad=p.rad+pulse;const grd=ctx.createRadialGradient(-rad*.35,-rad*.45,1,0,0,rad*1.6);grd.addColorStop(0,'#fff');grd.addColorStop(.35,'#eaf7ff');grd.addColorStop(.75,'#7190a8');grd.addColorStop(1,'#203242');ctx.shadowColor='rgba(210,238,255,.9)';ctx.shadowBlur=7+pulse*8;ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,rad,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(-rad*.28,-rad*.32,Math.max(1,rad*.22),0,Math.PI*2);ctx.fill();ctx.restore()}}
function drawTrail(){if(!ball)return;for(let i=0;i<trail.length;i++){let t=trail[i],a=i/trail.length;ctx.globalAlpha=a*.16;ctx.fillStyle='#dff7ff';ctx.beginPath();ctx.arc(t.x,t.y,ball.r*a*.7,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawBall(b){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);const rg=ctx.createRadialGradient(-b.r*.38,-b.r*.45,1,0,0,b.r*1.25);rg.addColorStop(0,'#fff');rg.addColorStop(.18,'#d8fbff');rg.addColorStop(.58,'#2a8bc5');rg.addColorStop(1,'#06142c');ctx.shadowColor='rgba(38,226,255,.82)';ctx.shadowBlur=17;ctx.fillStyle=rg;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();ctx.lineWidth=1.4;ctx.strokeStyle='rgba(255,255,255,.86)';ctx.stroke();ctx.restore()}
function drawFX(){for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()}for(const p of sparkles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#fff8c7';ctx.shadowColor='#fff091';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,2.3*p.life,0,Math.PI*2);ctx.fill();ctx.restore()}}
initUI();window.addEventListener('resize',resize);setTimeout(resize,50);
})();
</script></body></html>
